[theme]
primaryColor        = "#667eea"
backgroundColor     = "#0f0c29"
secondaryBackgroundColor = "#302b63"
textColor           = "#e2e8f0"
font                = "sans serif"

[server]
# Streamlit Cloud manages the port automatically — do NOT set port here
headless = true
enableCORS = false

[browser]
gatherUsageStats = false
